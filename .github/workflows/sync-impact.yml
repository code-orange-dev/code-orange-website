name: Sync impact numbers

# Keeps lib/impact-data.json in sync with the public PR-tracking dashboard
# so the /impact page never shows stale outcome metrics.

on:
  schedule:
    # Every day at 06:00 UTC (~14:00 WITA, Bali morning).
    - cron: '0 6 * * *'
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Allow the workflow to push the refreshed JSON back to the repo.
permissions:
  contents: write

concurrency:
  group: sync-impact
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync impact data from public dashboard
        run: node scripts/sync-impact.mjs

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain lib/impact-data.json)" ]]; then
            git config user.name  "code-orange-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add lib/impact-data.json
            git commit -m "chore(impact): sync outcome numbers from PR dashboard [skip ci]"
            git push
            echo "Impact data updated and pushed."
          else
            echo "No change — impact data already current."
          fi
